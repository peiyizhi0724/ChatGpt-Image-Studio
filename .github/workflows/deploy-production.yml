name: Deploy Production

on:
  push:
    branches:
      - production
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Start SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}

      - name: Add server to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p "${{ secrets.DEPLOY_PORT }}" "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy to server
        env:
          APP_DIR: ${{ secrets.DEPLOY_APP_DIR }}
          DEPLOY_BRANCH: ${{ github.ref_name }}
          DEPLOY_REPO_URL: ${{ github.server_url }}/${{ github.repository }}.git
          HEALTHCHECK_URL: ${{ secrets.HEALTHCHECK_URL }}
        run: |
          ssh -p "${{ secrets.DEPLOY_PORT }}" "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" \
            "APP_DIR='$APP_DIR' DEPLOY_BRANCH='$DEPLOY_BRANCH' DEPLOY_REPO_URL='$DEPLOY_REPO_URL' HEALTHCHECK_URL='$HEALTHCHECK_URL' bash -s" \
            < scripts/deploy-production.sh
